<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>衛生薬学ライブクイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg: #0B1120;
    --card: #131B2E;
    --card-hover: #1A2540;
    --accent: #00D4AA;
    --accent-dim: rgba(0,212,170,0.12);
    --text: #E8ECF4;
    --text-dim: #7B8BA3;
    --correct: #00D4AA;
    --wrong: #FF4B6E;
    --c0: #FF4B6E; --c1: #3B82F6; --c2: #F59E0B; --c3: #10B981;
    --c0bg: rgba(255,75,110,0.10); --c1bg: rgba(59,130,246,0.10);
    --c2bg: rgba(245,158,11,0.10); --c3bg: rgba(16,185,129,0.10);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ── Screens ── */
  .screen { display: none; min-height: 100dvh; flex-direction: column; align-items: center; padding: 20px; }
  .screen.active { display: flex; }

  /* ── Landing ── */
  #landing { justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, rgba(0,212,170,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(59,130,246,0.05) 0%, transparent 50%),
                var(--bg);
  }
  .badge { display: inline-flex; align-items: center; gap: 8px; background: var(--accent-dim);
    border-radius: 40px; padding: 6px 16px; margin-bottom: 20px; }
  .badge span { color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: 2px; }
  h1 { font-size: clamp(28px,6vw,44px); font-weight: 900; line-height: 1.3; letter-spacing: -1px; text-align: center; }
  h1 em { font-style: normal; color: var(--accent); }
  .subtitle { color: var(--text-dim); font-size: 14px; margin-top: 14px; text-align: center; line-height: 1.7; }
  .mode-cards { display: flex; gap: 16px; margin-top: 48px; flex-wrap: wrap; justify-content: center; }
  .mode-card {
    background: var(--card); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px; padding: 28px 32px; width: 200px; text-align: center;
    transition: all .25s;
  }
  .mode-card:hover { background: var(--card-hover); border-color: var(--accent); transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,212,170,0.1); }
  .mode-card .icon { font-size: 36px; margin-bottom: 10px; }
  .mode-card .label { font-size: 17px; font-weight: 700; }
  .mode-card .desc { color: var(--text-dim); font-size: 12px; margin-top: 6px; }

  /* ── Shared ── */
  .btn-primary {
    background: var(--accent); color: #0B1120; border: none; border-radius: 12px;
    padding: 14px 32px; font-size: 15px; font-weight: 700; transition: all .2s;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text-dim); border: none;
    border-radius: 12px; padding: 14px 32px; font-size: 15px; font-weight: 600; }
  .btn-back { position: absolute; top: 14px; left: 14px; background: none; border: none;
    color: var(--text-dim); font-size: 13px; padding: 6px 10px; }
  .section-tag { background: var(--accent-dim); border-radius: 20px; padding: 4px 14px;
    color: var(--accent); font-size: 11px; font-weight: 600; display: inline-block; }
  .progress-dots { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
  .progress-dots .dot { width: 10px; height: 10px; border-radius: 5px; background: rgba(255,255,255,0.1); transition: all .3s; }
  .progress-dots .dot.current { width: 22px; background: var(--accent); }
  .progress-dots .dot.correct { background: var(--correct); }
  .progress-dots .dot.wrong { background: var(--wrong); }

  /* ── Timer Ring ── */
  .timer-ring { position: relative; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring .num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-weight: 700; }

  /* ── Choice Grid ── */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 560px; }
  .choice-btn {
    border-radius: 14px; padding: 14px 12px; text-align: left;
    display: flex; align-items: center; gap: 10px; min-height: 52px;
    transition: all .2s; border: 1px solid rgba(255,255,255,0.04);
  }
  .choice-btn .shape { font-size: 17px; font-weight: 700; flex-shrink: 0; }
  .choice-btn .txt { font-size: clamp(12px,3vw,14px); font-weight: 500; line-height: 1.4; color: var(--text); }
  .choice-btn[data-i="0"] { background: var(--c0bg); } .choice-btn[data-i="0"] .shape { color: var(--c0); }
  .choice-btn[data-i="1"] { background: var(--c1bg); } .choice-btn[data-i="1"] .shape { color: var(--c1); }
  .choice-btn[data-i="2"] { background: var(--c2bg); } .choice-btn[data-i="2"] .shape { color: var(--c2); }
  .choice-btn[data-i="3"] { background: var(--c3bg); } .choice-btn[data-i="3"] .shape { color: var(--c3); }
  .choice-btn.selected { border-width: 2px; filter: brightness(1.3); }
  .choice-btn.reveal-correct { background: rgba(0,212,170,0.2); border: 2px solid var(--correct); }
  .choice-btn.reveal-wrong { background: rgba(255,75,110,0.15); border: 2px solid var(--wrong); opacity: 0.7; }
  .choice-btn.reveal-dim { opacity: 0.35; }

  /* ── Explanation Box ── */
  .explain-box { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 14px 18px;
    max-width: 560px; width: 100%; margin-top: 16px; }
  .explain-box .lbl { color: var(--text-dim); font-size: 11px; font-weight: 600; margin-bottom: 4px; }
  .explain-box .txt { font-size: 13px; line-height: 1.7; }

  /* ── Results ── */
  .result-stats { display: flex; gap: 32px; justify-content: center; margin: 24px 0; }
  .result-stats .stat { text-align: center; }
  .result-stats .stat .num { font-size: 24px; font-weight: 700; }
  .result-stats .stat .lbl { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

  /* ── Teacher ── */
  .teacher-card { background: var(--card); border-radius: 20px; padding: 24px 28px; width: 100%;
    max-width: 800px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 16px; }
  .teacher-bar { display: flex; align-items: center; justify-content: space-between; width: 100%;
    max-width: 800px; margin-bottom: 14px; font-size: 13px; color: var(--text-dim); }
  .chart-bar { display: flex; align-items: flex-end; gap: 20px; height: 140px; justify-content: center; }
  .chart-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; max-width: 120px; }
  .chart-col .bar { width: 100%; border-radius: 6px 6px 0 0; transition: height .3s; min-height: 4px; }
  .chart-col .bar[data-i="0"] { background: var(--c0); }
  .chart-col .bar[data-i="1"] { background: var(--c1); }
  .chart-col .bar[data-i="2"] { background: var(--c2); }
  .chart-col .bar[data-i="3"] { background: var(--c3); }
  .chart-col .bar.bar-correct { background: var(--correct) !important; }
  .chart-col .count { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; }
  .chart-col .shape { font-size: 18px; }

  /* ── Checkpoint Select (Teacher) ── */
  .cp-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 500px; margin-top: 24px; }
  .cp-item { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px;
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    transition: all .2s; }
  .cp-item:hover { border-color: var(--accent); background: var(--card-hover); }
  .cp-item .info .name { font-weight: 700; font-size: 15px; }
  .cp-item .info .meta { color: var(--text-dim); font-size: 12px; margin-top: 3px; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .choices { grid-template-columns: 1fr; }
    .mode-cards { flex-direction: column; align-items: center; }
    .result-stats { gap: 20px; }
  }
</style>
</head>
<body>

<!-- ══════════ LANDING ══════════ -->
<div id="landing" class="screen active">
  <div class="badge"><span>⚡ LIVE QUIZ</span></div>
  <h1>衛生薬学<br><em>ライブクイズ</em></h1>
  <div class="subtitle" id="landing-subtitle">読み込み中…</div>
  <div class="mode-cards">
    <button class="mode-card" onclick="enterTeacher()">
      <div class="icon">🎓</div>
      <div class="label">教員モード</div>
      <div class="desc">プロジェクタ投影用</div>
    </button>
    <button class="mode-card" onclick="enterStudent()">
      <div class="icon">📱</div>
      <div class="label">学生モード</div>
      <div class="desc">スマホで回答</div>
    </button>
  </div>
</div>

<!-- ══════════ STUDENT: READY ══════════ -->
<div id="s-ready" class="screen">
  <button class="btn-back" onclick="goLanding()">← 戻る</button>
  <div style="text-align:center; margin-top:60px">
    <div style="font-size:56px; margin-bottom:16px">📱</div>
    <h2 style="font-size:22px; font-weight:700; margin-bottom:8px" id="s-ready-title"></h2>
    <p style="color:var(--text-dim); font-size:13px; line-height:1.7; margin-bottom:32px" id="s-ready-desc"></p>
    <button class="btn-primary" onclick="studentStart()">スタート ⚡</button>
  </div>
</div>

<!-- ══════════ STUDENT: QUESTION ══════════ -->
<div id="s-question" class="screen" style="justify-content:flex-start; padding-top:16px">
  <div style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:560px; margin-bottom:10px">
    <span style="color:var(--text-dim); font-size:12px; font-weight:600" id="s-progress-text"></span>
    <div style="display:flex; align-items:center; gap:8px">
      <span id="s-streak" style="color:#F59E0B; font-size:12px; font-weight:700; display:none"></span>
      <span class="mono" style="color:var(--accent); font-size:14px; font-weight:700" id="s-score">0 pts</span>
    </div>
  </div>
  <div class="progress-dots" id="s-dots"></div>
  <div class="timer-ring" id="s-timer" style="margin:18px 0"></div>
  <div class="section-tag" id="s-section" style="margin-bottom:10px"></div>
  <h3 style="font-size:clamp(15px,4vw,19px); font-weight:700; text-align:center; max-width:560px; line-height:1.6; margin-bottom:20px" id="s-question-text"></h3>
  <div class="choices" id="s-choices"></div>
  <div class="explain-box" id="s-explain" style="display:none">
    <div class="lbl">💡 解説</div>
    <div class="txt" id="s-explain-text"></div>
  </div>
  <button class="btn-primary" id="s-next-btn" style="display:none; margin-top:16px; width:100%; max-width:560px" onclick="studentNext()">次の問題 →</button>
</div>

<!-- ══════════ STUDENT: RESULT ══════════ -->
<div id="s-result" class="screen" style="justify-content:center">
  <div style="text-align:center; max-width:400px">
    <div style="font-size:56px; margin-bottom:12px" id="s-result-emoji"></div>
    <h2 style="font-size:26px; font-weight:800; margin-bottom:4px" id="s-result-msg"></h2>
    <div class="mono" style="color:var(--accent); font-size:44px; font-weight:800; margin:16px 0" id="s-result-score"></div>
    <div class="result-stats" id="s-result-stats"></div>
    <div class="progress-dots" id="s-result-dots" style="margin-bottom:28px"></div>
    <div style="display:flex; gap:10px; justify-content:center">
      <button class="btn-primary" onclick="studentReset()">もう一度</button>
      <button class="btn-ghost" onclick="goLanding()">ホームへ</button>
    </div>
  </div>
</div>

<!-- ══════════ TEACHER: LOBBY ══════════ -->
<div id="t-lobby" class="screen" style="justify-content:flex-start; padding-top:20px">
  <button class="btn-back" onclick="goLanding()">← 戻る</button>
  <div style="text-align:center; margin-top:40px">
    <div style="font-size:48px; margin-bottom:12px">🎓</div>
    <h2 style="font-size:22px; font-weight:700; margin-bottom:4px" id="t-lobby-title"></h2>
    <p style="color:var(--text-dim); font-size:13px; margin-bottom:8px">チェックポイントを選択してください</p>
  </div>
  <div class="cp-list" id="t-cp-list"></div>
</div>

<!-- ══════════ TEACHER: LIVE ══════════ -->
<div id="t-live" class="screen" style="justify-content:flex-start; padding-top:16px">
  <button class="btn-back" onclick="teacherBackToLobby()">← チェックポイント選択</button>
  <div class="teacher-bar" id="t-bar"></div>

  <div class="teacher-card">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px">
      <div>
        <div class="section-tag" id="t-section" style="margin-bottom:10px"></div>
        <h3 style="font-size:clamp(16px,3vw,21px); font-weight:700; line-height:1.6" id="t-question-text"></h3>
      </div>
      <div class="timer-ring" id="t-timer"></div>
    </div>
    <div class="choices" id="t-choices" style="margin-top:18px; max-width:100%"></div>
  </div>

  <div class="teacher-card" id="t-chart-card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px">
      <span style="color:var(--text-dim); font-size:13px; font-weight:600">回答分布</span>
      <span id="t-correct-rate" style="font-size:14px; font-weight:700; display:none"></span>
    </div>
    <div class="chart-bar" id="t-chart"></div>
  </div>

  <div class="explain-box" id="t-explain" style="max-width:800px; display:none; background:rgba(0,212,170,0.08)">
    <div class="lbl" style="color:var(--accent)">💡 解説</div>
    <div class="txt" id="t-explain-text"></div>
  </div>

  <div style="display:flex; gap:12px; max-width:800px; width:100%; margin-top:12px">
    <button class="btn-primary" id="t-action-btn" style="flex:1" onclick="teacherAction()"></button>
  </div>
</div>

<script>
/* ═══════════ DATA ═══════════ */
let quizData = null;
let allQuestions = [];

const SHAPES = ['▲','◆','●','■'];
const COLORS_ARR = ['var(--c0)','var(--c1)','var(--c2)','var(--c3)'];

/* ═══════════ URL PARAMS ═══════════ */
function getParam(key) {
  return new URLSearchParams(location.search).get(key);
}

/* ═══════════ LOAD DATA ═══════════ */
async function loadQuiz() {
  const lecture = getParam('lecture') || '01';
  const cp = getParam('cp') || null;
  const mode = getParam('mode') || null;

  try {
    const res = await fetch(`lecture_quizzes/quiz_${lecture.padStart(2,'0')}.json`);
    quizData = await res.json();
  } catch(e) {
    // Fallback: embedded data for demo
    quizData = DEMO_DATA;
  }

  allQuestions = [];
  quizData.checkpoints.forEach(c => c.questions.forEach(q => { q._section = c.section; allQuestions.push(q); }));

  document.getElementById('landing-subtitle').innerHTML =
    `第${quizData.lecture}回「${quizData.title}」<br>全${allQuestions.length}問 ・ ${quizData.checkpoints.length}チェックポイント`;

  // Auto-enter mode from URL
  if (mode === 'student') {
    if (cp) {
      studentCpFilter = cp;
    }
    enterStudent();
  } else if (mode === 'teacher') {
    enterTeacher();
  }
}

/* ═══════════ NAVIGATION ═══════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goLanding() { showScreen('landing'); }

/* ═══════════ STUDENT MODE ═══════════ */
let sIdx = 0, sSelected = null, sScore = 0, sStreak = 0, sAnswers = {}, sTimeLeft = 0, sTimerId = null;
let studentQuestions = [];
let studentCpFilter = null;

function enterStudent() {
  const cp = studentCpFilter || getParam('cp');
  if (cp) {
    const checkpoint = quizData.checkpoints.find(c => c.id === cp);
    studentQuestions = checkpoint ? checkpoint.questions.map(q => { q._section = checkpoint.section; return q; }) : allQuestions;
  } else {
    studentQuestions = allQuestions;
  }
  sIdx = 0; sScore = 0; sStreak = 0; sAnswers = {};
  document.getElementById('s-ready-title').textContent = `第${quizData.lecture}回 ${quizData.title}`;
  document.getElementById('s-ready-desc').textContent = `全${studentQuestions.length}問 ・ 早く正解するほど高得点！`;
  showScreen('s-ready');
}

function studentStart() { sShowQuestion(); }

function sShowQuestion() {
  showScreen('s-question');
  const q = studentQuestions[sIdx];
  sSelected = null;
  sTimeLeft = q.time_limit;

  document.getElementById('s-progress-text').textContent = `${sIdx+1} / ${studentQuestions.length}`;
  document.getElementById('s-score').textContent = `${sScore} pts`;
  const streakEl = document.getElementById('s-streak');
  if (sStreak >= 2) { streakEl.style.display = ''; streakEl.textContent = `🔥 ${sStreak}連続`; }
  else streakEl.style.display = 'none';

  // Dots
  const dotsEl = document.getElementById('s-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < studentQuestions.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === sIdx ? ' current' : '') + (sAnswers[i] === true ? ' correct' : '') + (sAnswers[i] === false ? ' wrong' : '');
    dotsEl.appendChild(d);
  }

  document.getElementById('s-section').textContent = q._section;
  document.getElementById('s-question-text').textContent = q.question;
  renderTimer('s-timer', sTimeLeft, q.time_limit, 60);
  renderChoices('s-choices', q, null, false, sHandleChoice);
  document.getElementById('s-explain').style.display = 'none';
  document.getElementById('s-next-btn').style.display = 'none';

  clearInterval(sTimerId);
  sTimerId = setInterval(() => {
    sTimeLeft--;
    renderTimer('s-timer', sTimeLeft, q.time_limit, 60);
    if (sTimeLeft <= 0) {
      clearInterval(sTimerId);
      sAnswers[sIdx] = false;
      sStreak = 0;
      sReveal();
    }
  }, 1000);
}

function sHandleChoice(idx) {
  if (sSelected !== null) return;
  clearInterval(sTimerId);
  sSelected = idx;
  const q = studentQuestions[sIdx];
  const isCorrect = idx === q.answer;
  if (isCorrect) {
    sScore += Math.round((sTimeLeft / q.time_limit) * 500) + 500;
    sStreak++;
  } else {
    sStreak = 0;
  }
  sAnswers[sIdx] = isCorrect;
  setTimeout(sReveal, 400);
}

function sReveal() {
  const q = studentQuestions[sIdx];
  renderChoices('s-choices', q, sSelected, true, null);
  document.getElementById('s-explain').style.display = '';
  document.getElementById('s-explain-text').textContent = q.explanation;
  document.getElementById('s-score').textContent = `${sScore} pts`;
  const btn = document.getElementById('s-next-btn');
  btn.style.display = '';
  btn.textContent = sIdx + 1 < studentQuestions.length ? '次の問題 →' : '結果を見る 🏁';
}

function studentNext() {
  if (sIdx + 1 >= studentQuestions.length) {
    sShowResult();
  } else {
    sIdx++;
    sShowQuestion();
  }
}

function sShowResult() {
  showScreen('s-result');
  const correct = Object.values(sAnswers).filter(Boolean).length;
  const pct = Math.round(correct / studentQuestions.length * 100);
  let emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = '素晴らしい！'; }
  else if (pct >= 70) { emoji = '🎉'; msg = 'よくできました！'; }
  else if (pct >= 50) { emoji = '📚'; msg = '復習しよう！'; }
  else { emoji = '💪'; msg = '次回がんばろう！'; }

  document.getElementById('s-result-emoji').textContent = emoji;
  document.getElementById('s-result-msg').textContent = msg;
  document.getElementById('s-result-score').innerHTML = `${sScore}<span style="font-size:16px; color:var(--text-dim); font-weight:400"> pts</span>`;

  document.getElementById('s-result-stats').innerHTML = `
    <div class="stat"><div class="num" style="color:var(--correct)">${correct}</div><div class="lbl">正解</div></div>
    <div class="stat"><div class="num" style="color:var(--wrong)">${studentQuestions.length - correct}</div><div class="lbl">不正解</div></div>
    <div class="stat"><div class="num">${pct}%</div><div class="lbl">正答率</div></div>`;

  const dotsEl = document.getElementById('s-result-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < studentQuestions.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (sAnswers[i] === true ? ' correct' : ' wrong');
    dotsEl.appendChild(d);
  }
}

function studentReset() { enterStudent(); }

/* ═══════════ TEACHER MODE ═══════════ */
let tCpIdx = 0, tQIdx = 0, tPhase = 'lobby', tTimeLeft = 0, tTimerId = null;
let tSimResponses = [0,0,0,0], tSimTotal = 0, tSimId = null;
let currentCpQuestions = [];
const STUDENT_COUNT = 85;

function enterTeacher() {
  showScreen('t-lobby');
  document.getElementById('t-lobby-title').textContent = `第${quizData.lecture}回 ${quizData.title}`;
  const list = document.getElementById('t-cp-list');
  list.innerHTML = '';
  quizData.checkpoints.forEach((cp, i) => {
    const el = document.createElement('button');
    el.className = 'cp-item';
    el.innerHTML = `<div class="info"><div class="name">${cp.section}</div><div class="meta">Slide ${cp.after_slide}後 ・ ${cp.questions.length}問</div></div><span style="color:var(--accent); font-weight:700">→</span>`;
    el.onclick = () => teacherSelectCp(i);
    list.appendChild(el);
  });
}

function teacherBackToLobby() {
  clearInterval(tTimerId); clearInterval(tSimId);
  enterTeacher();
}

function teacherSelectCp(idx) {
  tCpIdx = idx;
  tQIdx = 0;
  const cp = quizData.checkpoints[idx];
  currentCpQuestions = cp.questions.map(q => { q._section = cp.section; return q; });
  tPhase = 'ready';
  tRenderLive();
}

function tRenderLive() {
  showScreen('t-live');
  const q = currentCpQuestions[tQIdx];

  // Bar
  document.getElementById('t-bar').innerHTML = `
    <div style="display:flex; align-items:center; gap:10px">
      <span style="font-weight:600">Q${tQIdx+1}/${currentCpQuestions.length}</span>
      <span class="section-tag">${q._section}</span>
    </div>
    <div style="display:flex; align-items:center; gap:6px">
      <span>👥</span><span>${tSimTotal} / ${STUDENT_COUNT} 回答済</span>
    </div>`;

  document.getElementById('t-section').textContent = q._section;
  document.getElementById('t-question-text').textContent = q.question;

  const isReveal = tPhase === 'reveal';
  renderChoices('t-choices', q, null, isReveal, null);
  renderTimer('t-timer', tPhase === 'ready' ? q.time_limit : tTimeLeft, q.time_limit, 52);

  // Chart
  document.getElementById('t-chart-card').style.display = (tPhase === 'ready') ? 'none' : '';
  if (tPhase !== 'ready') tRenderChart(q);

  // Explain
  document.getElementById('t-explain').style.display = isReveal ? '' : 'none';
  if (isReveal) document.getElementById('t-explain-text').textContent = q.explanation;

  // Rate
  const rateEl = document.getElementById('t-correct-rate');
  if (isReveal && tSimTotal > 0) {
    const pct = Math.round(tSimResponses[q.answer] / tSimTotal * 100);
    rateEl.style.display = '';
    rateEl.textContent = `正答率 ${pct}%`;
    rateEl.style.color = pct >= 70 ? 'var(--correct)' : 'var(--wrong)';
  } else {
    rateEl.style.display = 'none';
  }

  // Button
  const btn = document.getElementById('t-action-btn');
  if (tPhase === 'ready') { btn.textContent = '⚡ 出題する'; btn.style.background = 'var(--accent)'; }
  else if (tPhase === 'live') { btn.textContent = '🔔 回答を締め切る'; btn.style.background = '#F59E0B'; }
  else { btn.textContent = tQIdx + 1 < currentCpQuestions.length ? '次の問題 →' : '✓ チェックポイント完了'; btn.style.background = 'var(--accent)'; }
}

function tRenderChart(q) {
  const isReveal = tPhase === 'reveal';
  const maxVal = Math.max(...tSimResponses, 1);
  const el = document.getElementById('t-chart');
  el.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const h = Math.round((tSimResponses[i] / maxVal) * 110);
    const col = document.createElement('div');
    col.className = 'chart-col';
    const bar = document.createElement('div');
    bar.className = 'bar' + (isReveal && i === q.answer ? ' bar-correct' : '');
    bar.setAttribute('data-i', i);
    bar.style.height = h + 'px';
    const count = document.createElement('div');
    count.className = 'count';
    count.textContent = tSimResponses[i];
    const shape = document.createElement('div');
    shape.className = 'shape';
    shape.textContent = SHAPES[i];
    shape.style.color = isReveal && i === q.answer ? 'var(--correct)' : `var(--c${i})`;
    col.appendChild(count);
    col.appendChild(bar);
    col.appendChild(shape);
    el.appendChild(col);
  }
}

function teacherAction() {
  if (tPhase === 'ready') {
    // Start
    const q = currentCpQuestions[tQIdx];
    tTimeLeft = q.time_limit;
    tSimResponses = [0,0,0,0];
    tSimTotal = 0;
    tPhase = 'live';
    tStartSim(q);
    tTimerId = setInterval(() => {
      tTimeLeft--;
      renderTimer('t-timer', tTimeLeft, q.time_limit, 52);
      tUpdateBar();
      tRenderChart(q);
      if (tTimeLeft <= 0) {
        clearInterval(tTimerId);
      }
    }, 1000);
    tRenderLive();
  } else if (tPhase === 'live') {
    // Reveal
    clearInterval(tTimerId);
    clearInterval(tSimId);
    tPhase = 'reveal';
    tRenderLive();
  } else {
    // Next or finish
    if (tQIdx + 1 < currentCpQuestions.length) {
      tQIdx++;
      tPhase = 'ready';
      tRenderLive();
    } else {
      teacherBackToLobby();
    }
  }
}

function tStartSim(q) {
  tSimId = setInterval(() => {
    if (tSimTotal >= STUDENT_COUNT) { clearInterval(tSimId); return; }
    const r = Math.random();
    let pick;
    if (r < 0.55) pick = q.answer;
    else pick = [0,1,2,3].filter(x => x !== q.answer)[Math.floor(Math.random()*3)];
    tSimResponses[pick]++;
    tSimTotal++;
  }, 100);
}

function tUpdateBar() {
  const bar = document.getElementById('t-bar');
  if (!bar) return;
  const spans = bar.querySelectorAll('span');
  if (spans.length >= 4) spans[3].textContent = `${tSimTotal} / ${STUDENT_COUNT} 回答済`;
}

/* ═══════════ SHARED RENDERERS ═══════════ */
function renderTimer(containerId, seconds, total, size) {
  const el = document.getElementById(containerId);
  const r = (size - 8) / 2;
  const c = 2 * Math.PI * r;
  const progress = Math.max(0, seconds / total);
  const urgent = seconds <= 5;
  const stroke = urgent ? 'var(--wrong)' : 'var(--accent)';
  const color = urgent ? 'var(--wrong)' : 'var(--text)';
  el.innerHTML = `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${stroke}" stroke-width="4" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-progress)}" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/></svg><div class="num" style="font-size:${size*0.32}px; color:${color}">${Math.max(0,seconds)}</div>`;
  el.style.width = size + 'px';
  el.style.height = size + 'px';
}

function renderChoices(containerId, q, selected, isReveal, onClick) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.setAttribute('data-i', i);
    if (!isReveal && selected === i) btn.classList.add('selected');
    if (isReveal) {
      if (i === q.answer) btn.classList.add('reveal-correct');
      else if (selected === i) btn.classList.add('reveal-wrong');
      else btn.classList.add('reveal-dim');
    }
    btn.innerHTML = `<span class="shape">${SHAPES[i]}</span><span class="txt">${choice}</span>${isReveal && i === q.answer ? '<span style="margin-left:auto; font-size:16px">✓</span>' : ''}`;
    if (onClick && !isReveal) btn.onclick = () => onClick(i);
    if (isReveal || !onClick) btn.style.cursor = 'default';
    el.appendChild(btn);
  });
}
