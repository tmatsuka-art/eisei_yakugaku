<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>衛生薬学ライブクイズ</title>

<!-- Firebase SDK (v9 compat - CDN版) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg: #0B1120; --card: #131B2E; --card-hover: #1A2540;
    --accent: #00D4AA; --accent-dim: rgba(0,212,170,0.12);
    --text: #E8ECF4; --text-dim: #7B8BA3;
    --correct: #00D4AA; --wrong: #FF4B6E;
    --c0: #FF4B6E; --c1: #3B82F6; --c2: #F59E0B; --c3: #10B981;
    --c0bg: rgba(255,75,110,0.10); --c1bg: rgba(59,130,246,0.10);
    --c2bg: rgba(245,158,11,0.10); --c3bg: rgba(16,185,129,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; overflow-x:hidden; }
  button { font-family:inherit; cursor:pointer; }
  .mono { font-family:'JetBrains Mono',monospace; }
  .screen { display:none; min-height:100dvh; flex-direction:column; align-items:center; padding:20px; }
  .screen.active { display:flex; }
  .btn-primary { background:var(--accent); color:#0B1120; border:none; border-radius:12px; padding:14px 32px; font-size:15px; font-weight:700; transition:all .2s; }
  .btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.4; cursor:default; transform:none; filter:none; }
  .btn-ghost { background:rgba(255,255,255,0.06); color:var(--text-dim); border:none; border-radius:12px; padding:14px 32px; font-size:15px; font-weight:600; }
  .btn-back { position:absolute; top:14px; left:14px; background:none; border:none; color:var(--text-dim); font-size:13px; padding:6px 10px; }
  .section-tag { background:var(--accent-dim); border-radius:20px; padding:4px 14px; color:var(--accent); font-size:11px; font-weight:600; display:inline-block; }
  .badge { display:inline-flex; align-items:center; gap:8px; background:var(--accent-dim); border-radius:40px; padding:6px 16px; margin-bottom:20px; }
  .badge span { color:var(--accent); font-size:12px; font-weight:700; letter-spacing:2px; }

  /* Room code display */
  .room-code { font-family:'JetBrains Mono',monospace; font-size:clamp(36px,8vw,56px); font-weight:800; letter-spacing:8px; color:var(--accent); text-align:center; }
  .room-code-label { color:var(--text-dim); font-size:13px; font-weight:600; margin-bottom:6px; text-align:center; }

  /* Input */
  .input-field { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px 18px; font-size:18px; color:var(--text); font-family:'JetBrains Mono',monospace; text-align:center; letter-spacing:4px; width:200px; outline:none; transition:border-color .2s; }
  .input-field:focus { border-color:var(--accent); }
  .input-field::placeholder { color:var(--text-dim); letter-spacing:2px; font-size:14px; }
  .input-name { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px 18px; font-size:15px; color:var(--text); font-family:inherit; text-align:center; width:240px; outline:none; transition:border-color .2s; }
  .input-name:focus { border-color:var(--accent); }

  /* Choices */
  .choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:560px; }
  .choice-btn { border-radius:14px; padding:14px 12px; text-align:left; display:flex; align-items:center; gap:10px; min-height:52px; transition:all .2s; border:1px solid rgba(255,255,255,0.04); }
  .choice-btn .shape { font-size:17px; font-weight:700; flex-shrink:0; }
  .choice-btn .txt { font-size:clamp(12px,3vw,14px); font-weight:500; line-height:1.4; color:var(--text); }
  .choice-btn[data-i="0"] { background:var(--c0bg); } .choice-btn[data-i="0"] .shape { color:var(--c0); }
  .choice-btn[data-i="1"] { background:var(--c1bg); } .choice-btn[data-i="1"] .shape { color:var(--c1); }
  .choice-btn[data-i="2"] { background:var(--c2bg); } .choice-btn[data-i="2"] .shape { color:var(--c2); }
  .choice-btn[data-i="3"] { background:var(--c3bg); } .choice-btn[data-i="3"] .shape { color:var(--c3); }
  .choice-btn.selected { border-width:2px; filter:brightness(1.3); }
  .choice-btn.reveal-correct { background:rgba(0,212,170,0.2); border:2px solid var(--correct); }
  .choice-btn.reveal-wrong { background:rgba(255,75,110,0.15); border:2px solid var(--wrong); opacity:0.7; }
  .choice-btn.reveal-dim { opacity:0.35; }

  /* Timer ring */
  .timer-ring { position:relative; }
  .timer-ring svg { transform:rotate(-90deg); }
  .timer-ring .num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-weight:700; }

  /* Explain box */
  .explain-box { background:rgba(255,255,255,0.04); border-radius:12px; padding:14px 18px; max-width:560px; width:100%; margin-top:16px; }
  .explain-box .lbl { color:var(--text-dim); font-size:11px; font-weight:600; margin-bottom:4px; }
  .explain-box .body { font-size:13px; line-height:1.7; }

  /* Teacher chart */
  .teacher-card { background:var(--card); border-radius:20px; padding:24px 28px; width:100%; max-width:800px; border:1px solid rgba(255,255,255,0.05); margin-bottom:16px; }
  .chart-bar { display:flex; align-items:flex-end; gap:20px; height:140px; justify-content:center; }
  .chart-col { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; max-width:120px; }
  .chart-col .bar { width:100%; border-radius:6px 6px 0 0; transition:height .3s; min-height:4px; }
  .chart-col .bar[data-i="0"] { background:var(--c0); } .chart-col .bar[data-i="1"] { background:var(--c1); }
  .chart-col .bar[data-i="2"] { background:var(--c2); } .chart-col .bar[data-i="3"] { background:var(--c3); }
  .chart-col .bar.bar-correct { background:var(--correct) !important; }
  .chart-col .count { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; }

  /* Checkpoint list */
  .cp-list { display:flex; flex-direction:column; gap:10px; width:100%; max-width:500px; margin-top:24px; }
  .cp-item { background:var(--card); border:1px solid rgba(255,255,255,0.05); border-radius:14px; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; transition:all .2s; }
  .cp-item:hover { border-color:var(--accent); background:var(--card-hover); }
  .cp-item .info .name { font-weight:700; font-size:15px; }
  .cp-item .info .meta { color:var(--text-dim); font-size:12px; margin-top:3px; }

  /* Student waiting */
  .pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

  /* Live participant count */
  .participant-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.06); border-radius:20px; padding:4px 14px; }
  .participant-badge .dot { width:8px; height:8px; border-radius:50%; background:var(--correct); animation: pulse 1.5s infinite; }

  /* Progress dots */
  .progress-dots { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; }
  .progress-dots .dot { width:10px; height:10px; border-radius:5px; background:rgba(255,255,255,0.1); transition:all .3s; }
  .progress-dots .dot.current { width:22px; background:var(--accent); }
  .progress-dots .dot.correct { background:var(--correct); }
  .progress-dots .dot.wrong { background:var(--wrong); }

  .result-stats { display:flex; gap:32px; justify-content:center; margin:24px 0; }
  .result-stats .stat { text-align:center; }
  .result-stats .stat .num { font-size:24px; font-weight:700; }
  .result-stats .stat .lbl { color:var(--text-dim); font-size:12px; margin-top:2px; }

  @media (max-width:480px) { .choices { grid-template-columns:1fr; } }
</style>
</head>
<body>

<!-- ═══ LANDING ═══ -->
<div id="landing" class="screen active" style="justify-content:center; background:radial-gradient(ellipse at 30% 20%,rgba(0,212,170,0.07) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(59,130,246,0.05) 0%,transparent 50%),var(--bg)">
  <div class="badge"><span>⚡ LIVE QUIZ</span></div>
  <h1 style="font-size:clamp(28px,6vw,44px); font-weight:900; line-height:1.3; letter-spacing:-1px; text-align:center">衛生薬学<br><span style="color:var(--accent)">ライブクイズ</span></h1>
  <div id="landing-subtitle" style="color:var(--text-dim); font-size:14px; margin-top:14px; text-align:center; line-height:1.7">読み込み中…</div>
  <div id="landing-status" style="margin-top:12px; font-size:12px; color:var(--wrong)"></div>
  <div style="display:flex; gap:16px; margin-top:48px; flex-wrap:wrap; justify-content:center">
    <button class="mode-card" onclick="enterTeacher()" style="background:var(--card); border:1px solid rgba(255,255,255,0.05); border-radius:16px; padding:28px 32px; width:200px; text-align:center; transition:all .25s">
      <div style="font-size:36px; margin-bottom:10px">🎓</div>
      <div style="font-size:17px; font-weight:700">教員モード</div>
      <div style="color:var(--text-dim); font-size:12px; margin-top:6px">クイズを出題・集計</div>
    </button>
    <button class="mode-card" onclick="showJoinScreen()" style="background:var(--card); border:1px solid rgba(255,255,255,0.05); border-radius:16px; padding:28px 32px; width:200px; text-align:center; transition:all .25s">
      <div style="font-size:36px; margin-bottom:10px">📱</div>
      <div style="font-size:17px; font-weight:700">学生モード</div>
      <div style="color:var(--text-dim); font-size:12px; margin-top:6px">ルームコードで参加</div>
    </button>
  </div>
</div>

<!-- ═══ STUDENT: JOIN ═══ -->
<div id="s-join" class="screen" style="justify-content:center">
  <button class="btn-back" onclick="goLanding()">← 戻る</button>
  <div style="text-align:center">
    <div style="font-size:48px; margin-bottom:16px">📱</div>
    <h2 style="font-size:22px; font-weight:700; margin-bottom:24px">クイズに参加</h2>
    <div style="margin-bottom:16px">
      <div style="color:var(--text-dim); font-size:12px; font-weight:600; margin-bottom:8px">ルームコード</div>
      <input id="join-room-input" class="input-field" type="text" maxlength="4" placeholder="例: A3K7" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div style="margin-bottom:24px">
      <div style="color:var(--text-dim); font-size:12px; font-weight:600; margin-bottom:8px">ニックネーム（任意）</div>
      <input id="join-name-input" class="input-name" type="text" placeholder="匿名でもOK" maxlength="12">
    </div>
    <button class="btn-primary" onclick="studentJoin()">参加する →</button>
    <div id="join-error" style="color:var(--wrong); font-size:13px; margin-top:12px"></div>
  </div>
</div>

<!-- ═══ STUDENT: WAITING ═══ -->
<div id="s-waiting" class="screen" style="justify-content:center">
  <div style="text-align:center">
    <div style="font-size:48px; margin-bottom:16px">✅</div>
    <h2 style="font-size:20px; font-weight:700; margin-bottom:8px">参加しました！</h2>
    <div class="participant-badge" style="margin:16px auto">
      <div class="dot"></div>
      <span style="color:var(--text-dim); font-size:13px" id="s-wait-count">接続中…</span>
    </div>
    <p class="pulse" style="color:var(--text-dim); font-size:14px; margin-top:20px">先生がクイズを開始するまでお待ちください…</p>
  </div>
</div>

<!-- ═══ STUDENT: QUESTION ═══ -->
<div id="s-question" class="screen" style="justify-content:flex-start; padding-top:16px">
  <div style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:560px; margin-bottom:10px">
    <span style="color:var(--text-dim); font-size:12px; font-weight:600" id="s-progress-text"></span>
    <span class="mono" style="color:var(--accent); font-size:14px; font-weight:700" id="s-score">0 pts</span>
  </div>
  <div class="progress-dots" id="s-dots"></div>
  <div class="timer-ring" id="s-timer" style="margin:18px 0"></div>
  <div class="section-tag" id="s-section" style="margin-bottom:10px"></div>
  <h3 style="font-size:clamp(15px,4vw,19px); font-weight:700; text-align:center; max-width:560px; line-height:1.6; margin-bottom:20px" id="s-question-text"></h3>
  <div class="choices" id="s-choices"></div>
  <div id="s-answered-msg" style="display:none; text-align:center; margin-top:20px">
    <div style="font-size:32px; margin-bottom:8px" id="s-answered-icon"></div>
    <div style="font-size:15px; font-weight:600" id="s-answered-text"></div>
    <p class="pulse" style="color:var(--text-dim); font-size:13px; margin-top:12px">先生の解説を待っています…</p>
  </div>
  <div class="explain-box" id="s-explain" style="display:none">
    <div class="lbl">💡 解説</div>
    <div class="body" id="s-explain-text"></div>
  </div>
  <div id="s-wait-next" style="display:none; text-align:center; margin-top:20px">
    <p class="pulse" style="color:var(--text-dim); font-size:13px">次の問題を待っています…</p>
  </div>
</div>

<!-- ═══ STUDENT: RESULT ═══ -->
<div id="s-result" class="screen" style="justify-content:center">
  <div style="text-align:center; max-width:400px">
    <div style="font-size:56px; margin-bottom:12px" id="s-result-emoji"></div>
    <h2 style="font-size:26px; font-weight:800; margin-bottom:4px" id="s-result-msg"></h2>
    <div class="mono" style="color:var(--accent); font-size:44px; font-weight:800; margin:16px 0" id="s-result-score"></div>
    <div class="result-stats" id="s-result-stats"></div>
    <div class="progress-dots" id="s-result-dots" style="margin-bottom:28px"></div>
    <button class="btn-ghost" onclick="goLanding()">ホームへ</button>
  </div>
</div>

<!-- ═══ TEACHER: LOBBY (checkpoint select) ═══ -->
<div id="t-lobby" class="screen" style="justify-content:flex-start; padding-top:20px">
  <button class="btn-back" onclick="teacherCleanup(); goLanding()">← 戻る</button>
  <div style="text-align:center; margin-top:40px">
    <div style="font-size:48px; margin-bottom:12px">🎓</div>
    <h2 style="font-size:22px; font-weight:700; margin-bottom:8px" id="t-lobby-title"></h2>

    <div style="margin:20px auto; padding:20px 28px; background:var(--card); border-radius:16px; border:1px solid rgba(255,255,255,0.05); display:inline-block">
      <div class="room-code-label">ルームコード（学生に伝えてください）</div>
      <div class="room-code" id="t-room-code"></div>
      <div class="participant-badge" style="margin:12px auto 0">
        <div class="dot"></div>
        <span style="color:var(--text-dim); font-size:13px" id="t-participant-count">0人 参加中</span>
      </div>
    </div>

    <p style="color:var(--text-dim); font-size:13px; margin-bottom:8px">チェックポイントを選択してください</p>
  </div>
  <div class="cp-list" id="t-cp-list"></div>
</div>

<!-- ═══ TEACHER: LIVE ═══ -->
<div id="t-live" class="screen" style="justify-content:flex-start; padding-top:16px">
  <button class="btn-back" onclick="teacherBackToLobby()">← チェックポイント選択</button>

  <div style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:800px; margin-bottom:14px; font-size:13px; color:var(--text-dim)">
    <div style="display:flex; align-items:center; gap:10px">
      <span style="font-weight:600" id="t-bar-q"></span>
      <span class="section-tag" id="t-bar-section"></span>
    </div>
    <div class="participant-badge">
      <div class="dot"></div>
      <span id="t-bar-answers">0 / 0 回答済</span>
    </div>
  </div>

  <div class="teacher-card">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px">
      <h3 style="font-size:clamp(16px,3vw,21px); font-weight:700; line-height:1.6; flex:1" id="t-question-text"></h3>
      <div class="timer-ring" id="t-timer"></div>
    </div>
    <div class="choices" id="t-choices" style="margin-top:18px; max-width:100%"></div>
  </div>

  <div class="teacher-card" id="t-chart-card" style="display:none">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px">
      <span style="color:var(--text-dim); font-size:13px; font-weight:600">回答分布（リアルタイム）</span>
      <span id="t-correct-rate" style="font-size:14px; font-weight:700; display:none"></span>
    </div>
    <div class="chart-bar" id="t-chart"></div>
  </div>

  <div class="explain-box" id="t-explain" style="max-width:800px; display:none; background:rgba(0,212,170,0.08)">
    <div class="lbl" style="color:var(--accent)">💡 解説</div>
    <div class="body" id="t-explain-text"></div>
  </div>

  <div style="display:flex; gap:12px; max-width:800px; width:100%; margin-top:12px">
    <button class="btn-primary" id="t-action-btn" style="flex:1" onclick="teacherAction()"></button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   🔥 Firebase Configuration
   ─────────────────────────────────────
   以下を自分のFirebaseプロジェクトの値に置き換えてください。
   手順は README を参照。
   ═══════════════════════════════════════ */
const FIREBASE_CONFIG = {
 apiKey: "AIzaSyCsU4a-5OMoCtUbNYy5jI9o73u4eBvKye4",
  authDomain: "eisei-yakugaku-quiz.firebaseapp.com",
  projectId: "eisei-yakugaku-quiz",
  storageBucket: "eisei-yakugaku-quiz.firebasestorage.app",
  messagingSenderId: "584337277184",
  appId: "1:584337277184:web:e373b759567a49d8de33e5"
};

/* ═══════════ INIT FIREBASE ═══════════ */
let db = null;
let firebaseReady = false;

function initFirebase() {
  try {
    if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") {
      document.getElementById('landing-status').textContent = '⚠ Firebase未設定（デモモードで動作）';
      return false;
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    firebaseReady = true;
    document.getElementById('landing-status').textContent = '';
    return true;
  } catch(e) {
    document.getElementById('landing-status').textContent = '⚠ Firebase接続エラー: ' + e.message;
    return false;
  }
}

/* ═══════════ DATA ═══════════ */
let quizData = null;
let allQuestions = [];
const SHAPES = ['▲','◆','●','■'];

function getParam(k) { return new URLSearchParams(location.search).get(k); }

async function loadQuiz() {
  const lecture = getParam('lecture') || '01';
  try {
    const res = await fetch(`lecture_quizzes/quiz_${lecture.padStart(2,'0')}.json`);
    quizData = await res.json();
  } catch(e) {
    quizData = { lecture:1, title:"デモ", checkpoints:[{
      id:"CP1", section:"デモ", after_slide:1,
      questions:[
        { id:"D1", question:"乾燥大気で最も多いガスは？", choices:["O₂","N₂","Ar","CO₂"], answer:1, explanation:"N₂が78%で最多。", time_limit:15 },
        { id:"D2", question:"オゾン層がある層は？", choices:["対流圏","成層圏","中間圏","熱圏"], answer:1, explanation:"成層圏にある。", time_limit:15 }
      ]
    }]};
  }
  allQuestions = [];
  quizData.checkpoints.forEach(c => c.questions.forEach(q => { q._section = c.section; allQuestions.push(q); }));
  document.getElementById('landing-subtitle').innerHTML =
    `第${quizData.lecture}回「${quizData.title}」<br>全${allQuestions.length}問 ・ ${quizData.checkpoints.length}チェックポイント`;

  // URL auto-join
  const room = getParam('room');
  const mode = getParam('mode');
  if (room && mode === 'student') {
    document.getElementById('join-room-input').value = room.toUpperCase();
    showScreen('s-join');
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goLanding() { showScreen('landing'); }

/* ═══════════════════════════════════════
   ROOM CODE GENERATION
   ═══════════════════════════════════════ */
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0/O/1/I confusion
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

/* ═══════════════════════════════════════
   TEACHER MODE
   ═══════════════════════════════════════ */
let tRoomCode = '';
let tCpIdx = 0, tQIdx = 0, tPhase = 'lobby';
let tTimeLeft = 0, tTimerId = null;
let currentCpQuestions = [];
let tParticipants = 0;
let tAnswerListener = null;
let tParticipantListener = null;

function enterTeacher() {
  tRoomCode = generateRoomCode();
  showScreen('t-lobby');
  document.getElementById('t-lobby-title').textContent = `第${quizData.lecture}回 ${quizData.title}`;
  document.getElementById('t-room-code').textContent = tRoomCode;

  // Create room in Firebase
  if (firebaseReady) {
    db.ref(`rooms/${tRoomCode}`).set({
      lecture: quizData.lecture,
      title: quizData.title,
      phase: 'lobby',
      created: firebase.database.ServerValue.TIMESTAMP
    });

    // Listen for participants
    tParticipantListener = db.ref(`rooms/${tRoomCode}/participants`);
    tParticipantListener.on('value', snap => {
      const data = snap.val();
      tParticipants = data ? Object.keys(data).length : 0;
      document.getElementById('t-participant-count').textContent = `${tParticipants}人 参加中`;
      if (document.getElementById('t-bar-answers'))
        updateBarAnswers();
    });
  }

  // Render checkpoint list
  const list = document.getElementById('t-cp-list');
  list.innerHTML = '';
  quizData.checkpoints.forEach((cp, i) => {
    const el = document.createElement('button');
    el.className = 'cp-item';
    el.innerHTML = `<div class="info"><div class="name">${cp.section}</div><div class="meta">Slide ${cp.after_slide}後 ・ ${cp.questions.length}問</div></div><span style="color:var(--accent); font-weight:700">→</span>`;
    el.onclick = () => teacherSelectCp(i);
    list.appendChild(el);
  });
}

function teacherSelectCp(idx) {
  tCpIdx = idx;
  tQIdx = 0;
  const cp = quizData.checkpoints[idx];
  currentCpQuestions = cp.questions.map(q => { q._section = cp.section; return q; });
  tPhase = 'ready';
  tRenderLive();
}

function teacherBackToLobby() {
  clearInterval(tTimerId);
  if (tAnswerListener) { tAnswerListener.off(); tAnswerListener = null; }
  if (firebaseReady) {
    db.ref(`rooms/${tRoomCode}/phase`).set('lobby');
    db.ref(`rooms/${tRoomCode}/currentQ`).remove();
  }
  showScreen('t-lobby');
}

function teacherCleanup() {
  clearInterval(tTimerId);
  if (tAnswerListener) { tAnswerListener.off(); tAnswerListener = null; }
  if (tParticipantListener) { tParticipantListener.off(); tParticipantListener = null; }
  if (firebaseReady && tRoomCode) {
    db.ref(`rooms/${tRoomCode}`).remove();
  }
}

function tRenderLive() {
  showScreen('t-live');
  const q = currentCpQuestions[tQIdx];

  document.getElementById('t-bar-q').textContent = `Q${tQIdx+1}/${currentCpQuestions.length}`;
  document.getElementById('t-bar-section').textContent = q._section;
  document.getElementById('t-question-text').textContent = q.question;

  const isReveal = tPhase === 'reveal';
  renderChoices('t-choices', q, null, isReveal, null);
  renderTimer('t-timer', tPhase === 'ready' ? q.time_limit : tTimeLeft, q.time_limit, 52);

  document.getElementById('t-chart-card').style.display = tPhase === 'ready' ? 'none' : '';
  document.getElementById('t-explain').style.display = isReveal ? '' : 'none';
  if (isReveal) document.getElementById('t-explain-text').textContent = q.explanation;

  document.getElementById('t-correct-rate').style.display = 'none';

  const btn = document.getElementById('t-action-btn');
  if (tPhase === 'ready') { btn.textContent = '⚡ 出題する'; btn.style.background = 'var(--accent)'; btn.disabled = false; }
  else if (tPhase === 'live') { btn.textContent = '🔔 回答を締め切る'; btn.style.background = '#F59E0B'; btn.disabled = false; }
  else { btn.textContent = tQIdx + 1 < currentCpQuestions.length ? '次の問題 →' : '✓ チェックポイント完了'; btn.style.background = 'var(--accent)'; btn.disabled = false; }

  updateBarAnswers();
}

function updateBarAnswers() {
  const el = document.getElementById('t-bar-answers');
  if (!el) return;
  // Will be updated by Firebase listener
}

function tRenderChart(counts, answerIdx, isReveal) {
  const maxVal = Math.max(...counts, 1);
  const el = document.getElementById('t-chart');
  el.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const h = Math.round((counts[i] / maxVal) * 110);
    const col = document.createElement('div'); col.className = 'chart-col';
    const bar = document.createElement('div');
    bar.className = 'bar' + (isReveal && i === answerIdx ? ' bar-correct' : '');
    bar.setAttribute('data-i', i); bar.style.height = h + 'px';
    const count = document.createElement('div'); count.className = 'count'; count.textContent = counts[i];
    const shape = document.createElement('div'); shape.className = 'shape';
    shape.textContent = SHAPES[i];
    shape.style.color = isReveal && i === answerIdx ? 'var(--correct)' : `var(--c${i})`;
    col.appendChild(count); col.appendChild(bar); col.appendChild(shape);
    el.appendChild(col);
  }
}

function teacherAction() {
  const q = currentCpQuestions[tQIdx];

  if (tPhase === 'ready') {
    tPhase = 'live';
    tTimeLeft = q.time_limit;

    // Push to Firebase
    if (firebaseReady) {
      db.ref(`rooms/${tRoomCode}`).update({
        phase: 'live',
        currentQ: {
          cpIdx: tCpIdx,
          qIdx: tQIdx,
          questionId: q.id,
          timeLimit: q.time_limit,
          startedAt: firebase.database.ServerValue.TIMESTAMP
        }
      });
      // Clear old answers
      db.ref(`rooms/${tRoomCode}/answers/${q.id}`).remove();

      // Listen for answers
      if (tAnswerListener) tAnswerListener.off();
      tAnswerListener = db.ref(`rooms/${tRoomCode}/answers/${q.id}`);
      tAnswerListener.on('value', snap => {
        const data = snap.val() || {};
        const counts = [0,0,0,0];
        let total = 0;
        Object.values(data).forEach(v => {
          if (v.choice >= 0 && v.choice <= 3) { counts[v.choice]++; total++; }
        });
        tRenderChart(counts, q.answer, tPhase === 'reveal');
        document.getElementById('t-bar-answers').textContent = `${total} / ${tParticipants} 回答済`;

        if (tPhase === 'reveal' && total > 0) {
          const pct = Math.round(counts[q.answer] / total * 100);
          const rateEl = document.getElementById('t-correct-rate');
          rateEl.style.display = '';
          rateEl.textContent = `正答率 ${pct}%`;
          rateEl.style.color = pct >= 70 ? 'var(--correct)' : 'var(--wrong)';
        }
      });
    }

    // Timer
    clearInterval(tTimerId);
    tTimerId = setInterval(() => {
      tTimeLeft--;
      renderTimer('t-timer', tTimeLeft, q.time_limit, 52);
      if (tTimeLeft <= 0) clearInterval(tTimerId);
    }, 1000);

    tRenderLive();

  } else if (tPhase === 'live') {
    clearInterval(tTimerId);
    tPhase = 'reveal';
    if (firebaseReady) {
      db.ref(`rooms/${tRoomCode}/phase`).set('reveal');
    }
    tRenderLive();
    // Re-trigger chart with reveal styling
    if (tAnswerListener) {
      tAnswerListener.once('value', snap => {
        const data = snap.val() || {};
        const counts = [0,0,0,0]; let total = 0;
        Object.values(data).forEach(v => { if (v.choice >= 0 && v.choice <= 3) { counts[v.choice]++; total++; } });
        tRenderChart(counts, q.answer, true);
        if (total > 0) {
          const pct = Math.round(counts[q.answer] / total * 100);
          const rateEl = document.getElementById('t-correct-rate');
          rateEl.style.display = '';
          rateEl.textContent = `正答率 ${pct}%`;
          rateEl.style.color = pct >= 70 ? 'var(--correct)' : 'var(--wrong)';
        }
      });
    }

  } else {
    if (tAnswerListener) { tAnswerListener.off(); tAnswerListener = null; }
    if (tQIdx + 1 < currentCpQuestions.length) {
      tQIdx++;
      tPhase = 'ready';
      if (firebaseReady) {
        db.ref(`rooms/${tRoomCode}`).update({ phase: 'ready', currentQ: null });
      }
      tRenderLive();
    } else {
      if (firebaseReady) {
        db.ref(`rooms/${tRoomCode}/phase`).set('finished');
      }
      teacherBackToLobby();
    }
  }
}

/* ═══════════════════════════════════════
   STUDENT MODE (Firebase)
   ═══════════════════════════════════════ */
let sRoomCode = '', sPlayerId = '', sPlayerName = '';
let sScore = 0, sStreak = 0, sAnswers = {}, sSelected = null;
let sTimerId = null, sTimeLeft = 0;
let sCurrentQ = null, sCurrentQIdx = 0, sTotalQ = 0;
let sPhaseListener = null, sQListener = null;

function showJoinScreen() {
  const room = getParam('room');
  if (room) document.getElementById('join-room-input').value = room.toUpperCase();
  showScreen('s-join');
}

function studentJoin() {
  sRoomCode = document.getElementById('join-room-input').value.trim().toUpperCase();
  sPlayerName = document.getElementById('join-name-input').value.trim() || '匿名';
  const errEl = document.getElementById('join-error');

  if (sRoomCode.length !== 4) {
    errEl.textContent = 'ルームコードは4文字です';
    return;
  }

  if (!firebaseReady) {
    errEl.textContent = 'Firebase未設定です（教員に連絡してください）';
    return;
  }

  // Check room exists
  db.ref(`rooms/${sRoomCode}`).once('value', snap => {
    if (!snap.exists()) {
      errEl.textContent = 'ルームが見つかりません。コードを確認してください。';
      return;
    }
    errEl.textContent = '';

    // Register participant
    sPlayerId = db.ref().push().key;
    db.ref(`rooms/${sRoomCode}/participants/${sPlayerId}`).set({
      name: sPlayerName,
      joinedAt: firebase.database.ServerValue.TIMESTAMP
    });

    // Remove on disconnect
    db.ref(`rooms/${sRoomCode}/participants/${sPlayerId}`).onDisconnect().remove();

    sScore = 0; sStreak = 0; sAnswers = {};
    showScreen('s-waiting');

    // Update count display
    db.ref(`rooms/${sRoomCode}/participants`).on('value', snap => {
      const count = snap.val() ? Object.keys(snap.val()).length : 0;
      const el = document.getElementById('s-wait-count');
      if (el) el.textContent = `${count}人 参加中`;
    });

    // Listen for phase & question changes
    sPhaseListener = db.ref(`rooms/${sRoomCode}/phase`);
    sPhaseListener.on('value', snap => {
      const phase = snap.val();
      if (phase === 'reveal') sShowReveal();
      else if (phase === 'finished') sShowResult();
    });

    sQListener = db.ref(`rooms/${sRoomCode}/currentQ`);
    sQListener.on('value', snap => {
      const data = snap.val();
      if (!data) return;
      // New question pushed
      const cp = quizData.checkpoints[data.cpIdx];
      if (!cp) return;
      const q = cp.questions[data.qIdx];
      if (!q) return;
      q._section = cp.section;
      sCurrentQ = q;
      sCurrentQIdx = data.qIdx;
      sTotalQ = cp.questions.length;
      sSelected = null;
      sShowQuestion();
    });
  });
}

function sShowQuestion() {
  showScreen('s-question');
  const q = sCurrentQ;
  sTimeLeft = q.time_limit;
  sSelected = null;

  document.getElementById('s-progress-text').textContent = `${sCurrentQIdx+1} / ${sTotalQ}`;
  document.getElementById('s-score').textContent = `${sScore} pts`;
  document.getElementById('s-section').textContent = q._section;
  document.getElementById('s-question-text').textContent = q.question;
  renderTimer('s-timer', sTimeLeft, q.time_limit, 60);
  renderChoices('s-choices', q, null, false, sHandleChoice);

  // Reset UI
  document.getElementById('s-explain').style.display = 'none';
  document.getElementById('s-answered-msg').style.display = 'none';
  document.getElementById('s-wait-next').style.display = 'none';

  // Dots
  const dotsEl = document.getElementById('s-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < sTotalQ; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === sCurrentQIdx ? ' current' : '') + (sAnswers[i] === true ? ' correct' : '') + (sAnswers[i] === false ? ' wrong' : '');
    dotsEl.appendChild(d);
  }

  // Timer
  clearInterval(sTimerId);
  sTimerId = setInterval(() => {
    sTimeLeft--;
    renderTimer('s-timer', sTimeLeft, q.time_limit, 60);
    if (sTimeLeft <= 0) {
      clearInterval(sTimerId);
      if (sSelected === null) {
        sAnswers[sCurrentQIdx] = false;
        sStreak = 0;
        sShowAnswered(false);
      }
    }
  }, 1000);
}

function sHandleChoice(idx) {
  if (sSelected !== null) return;
  clearInterval(sTimerId);
  sSelected = idx;
  const q = sCurrentQ;
  const isCorrect = idx === q.answer;
  const bonus = Math.round((sTimeLeft / q.time_limit) * 500) + 500;
  if (isCorrect) { sScore += bonus; sStreak++; }
  else { sStreak = 0; }
  sAnswers[sCurrentQIdx] = isCorrect;

  // Send to Firebase
  if (firebaseReady) {
    db.ref(`rooms/${sRoomCode}/answers/${q.id}/${sPlayerId}`).set({
      choice: idx,
      time: sTimeLeft,
      name: sPlayerName
    });
  }

  document.getElementById('s-score').textContent = `${sScore} pts`;
  sShowAnswered(isCorrect);
}

function sShowAnswered(isCorrect) {
  // Gray out choices, highlight selected
  renderChoices('s-choices', sCurrentQ, sSelected, false, null);
  // Make all buttons non-clickable visually
  document.querySelectorAll('#s-choices .choice-btn').forEach(b => b.style.cursor = 'default');

  document.getElementById('s-answered-msg').style.display = '';
  document.getElementById('s-answered-icon').textContent = sSelected !== null ? (isCorrect ? '✅' : '❌') : '⏰';
  document.getElementById('s-answered-text').textContent = sSelected !== null
    ? (isCorrect ? `正解！ +${Math.round((sTimeLeft / sCurrentQ.time_limit) * 500) + 500} pts` : '不正解…')
    : '時間切れ…';
}

function sShowReveal() {
  if (!sCurrentQ) return;
  const q = sCurrentQ;
  renderChoices('s-choices', q, sSelected, true, null);
  document.getElementById('s-answered-msg').style.display = 'none';
  document.getElementById('s-explain').style.display = '';
  document.getElementById('s-explain-text').textContent = q.explanation;
  document.getElementById('s-wait-next').style.display = '';
}

function sShowResult() {
  showScreen('s-result');
  clearInterval(sTimerId);
  const total = sTotalQ;
  const correct = Object.values(sAnswers).filter(Boolean).length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  let emoji, msg;
  if (pct >= 90) { emoji='🏆'; msg='素晴らしい！'; }
  else if (pct >= 70) { emoji='🎉'; msg='よくできました！'; }
  else if (pct >= 50) { emoji='📚'; msg='復習しよう！'; }
  else { emoji='💪'; msg='次回がんばろう！'; }
  document.getElementById('s-result-emoji').textContent = emoji;
  document.getElementById('s-result-msg').textContent = msg;
  document.getElementById('s-result-score').innerHTML = `${sScore}<span style="font-size:16px;color:var(--text-dim);font-weight:400"> pts</span>`;
  document.getElementById('s-result-stats').innerHTML = `
    <div class="stat"><div class="num" style="color:var(--correct)">${correct}</div><div class="lbl">正解</div></div>
    <div class="stat"><div class="num" style="color:var(--wrong)">${total-correct}</div><div class="lbl">不正解</div></div>
    <div class="stat"><div class="num">${pct}%</div><div class="lbl">正答率</div></div>`;
  const dotsEl = document.getElementById('s-result-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (sAnswers[i] === true ? ' correct' : ' wrong');
    dotsEl.appendChild(d);
  }
}

/* ═══════════ SHARED RENDERERS ═══════════ */
function renderTimer(cid, seconds, total, size) {
  const el = document.getElementById(cid);
  const r = (size-8)/2, c = 2*Math.PI*r;
  const progress = Math.max(0,seconds/total);
  const urgent = seconds <= 5;
  const stroke = urgent ? 'var(--wrong)' : 'var(--accent)';
  const color = urgent ? 'var(--wrong)' : 'var(--text)';
  el.innerHTML = `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${stroke}" stroke-width="4" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-progress)}" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/></svg><div class="num" style="font-size:${size*0.32}px;color:${color}">${Math.max(0,seconds)}</div>`;
  el.style.width = size+'px'; el.style.height = size+'px';
}

function renderChoices(cid, q, selected, isReveal, onClick) {
  const el = document.getElementById(cid);
  el.innerHTML = '';
  q.choices.forEach((choice,i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.setAttribute('data-i',i);
    if (!isReveal && selected === i) btn.classList.add('selected');
    if (isReveal) {
      if (i === q.answer) btn.classList.add('reveal-correct');
      else if (selected === i) btn.classList.add('reveal-wrong');
      else btn.classList.add('reveal-dim');
    }
    btn.innerHTML = `<span class="shape">${SHAPES[i]}</span><span class="txt">${choice}</span>${isReveal && i === q.answer ? '<span style="margin-left:auto;font-size:16px">✓</span>' : ''}`;
    if (onClick && !isReveal) btn.onclick = () => onClick(i);
    if (isReveal || !onClick) btn.style.cursor = 'default';
    el.appendChild(btn);
  });
}

/* ═══════════ INIT ═══════════ */
initFirebase();
loadQuiz();
</script>
