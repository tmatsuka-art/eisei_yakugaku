<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衛生薬学 国試対策</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1f3d;
    --navy2: #1a3260;
    --blue: #2251a3;
    --accent: #e8a020;
    --accent2: #f0c050;
    --green: #1a7a4a;
    --green-bg: #e8f5ee;
    --red: #b02020;
    --red-bg: #fceaea;
    --gray: #f4f6fa;
    --border: #dde3ee;
    --text: #1a2035;
    --muted: #6b7a99;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--gray);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
    position: sticky; top: 0; z-index: 100;
  }
  .header-title { color: #fff; }
  .header-title span { font-family: 'Shippori Mincho', serif; font-size: 18px; font-weight: 700; letter-spacing: 1px; }
  .header-title small { display: block; color: #8fa8d8; font-size: 10px; letter-spacing: 2px; margin-top: -2px; }
  nav { display: flex; gap: 6px; }
  nav button {
    background: transparent; border: none; color: #8fa8d8;
    padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s; font-family: 'Noto Sans JP', sans-serif;
  }
  nav button.active, nav button:hover { background: rgba(255,255,255,.12); color: #fff; }

  /* ── LAYOUT ── */
  main { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

  /* ── CARDS ── */
  .card {
    background: #fff; border-radius: 14px;
    box-shadow: 0 2px 12px rgba(15,31,61,.07);
    padding: 22px;
  }

  /* ── BUTTONS ── */
  .btn {
    border: none; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700; cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--blue); color: #fff; padding: 12px 24px; font-size: 14px; }
  .btn-primary:hover { background: #1a3f8a; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(34,81,163,.35); }
  .btn-secondary { background: #fff; color: var(--blue); border: 2px solid var(--blue); padding: 10px 20px; font-size: 13px; }
  .btn-secondary:hover { background: #eef2fb; }
  .btn-accent { background: var(--accent); color: var(--navy); padding: 10px 20px; font-size: 13px; }
  .btn-accent:hover { background: var(--accent2); }
  .btn-sm { padding: 7px 14px; font-size: 12px; }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0; background: var(--navy);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; transition: opacity .5s;
  }
  #loading h1 { font-family: 'Shippori Mincho', serif; color: #fff; font-size: 28px; margin-bottom: 8px; }
  #loading p { color: #8fa8d8; font-size: 13px; margin-bottom: 32px; }
  .loader { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCREEN MANAGEMENT ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── HOME ── */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;
  }
  .stat-box {
    background: #fff; border-radius: 12px; padding: 16px; text-align: center;
    box-shadow: 0 2px 8px rgba(15,31,61,.06);
  }
  .stat-num { font-size: 28px; font-weight: 900; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 500; }

  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .cat-card {
    background: #fff; border-radius: 12px; padding: 16px;
    box-shadow: 0 2px 8px rgba(15,31,61,.06);
    border-left: 4px solid; cursor: pointer; transition: all .15s;
  }
  .cat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(15,31,61,.12); }
  .cat-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .cat-card p { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-bar { background: #e8ecf5; border-radius: 6px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 6px; transition: width .4s; }

  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .filter-btn {
    padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
    border: 2px solid var(--border); background: #fff; color: var(--muted);
    cursor: pointer; transition: all .15s; font-family: 'Noto Sans JP', sans-serif;
  }
  .filter-btn.active { border-color: var(--blue); background: var(--blue); color: #fff; }

  .section-filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

  /* ── QUIZ ── */
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .quiz-progress-text { font-size: 13px; color: var(--muted); font-weight: 600; }
  .tag {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  }
  .progress-bar-lg { background: #e8ecf5; border-radius: 8px; height: 8px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill-lg { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--blue), #5580d0); transition: width .4s; }

  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .q-title { font-family: 'Shippori Mincho', serif; font-size: 16px; font-weight: 700; line-height: 1.8; margin-bottom: 16px; }
  .q-image { max-width: 100%; border-radius: 8px; margin-bottom: 16px; border: 1px solid var(--border); }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    width: 100%; text-align: left; padding: 14px 18px;
    border-radius: 10px; font-size: 14px; font-weight: 500; line-height: 1.6;
    border: 2px solid var(--border); background: #fafbfd;
    cursor: pointer; transition: all .15s; font-family: 'Noto Sans JP', sans-serif;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--blue); background: #eef2fb; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { border-color: var(--green) !important; background: var(--green-bg) !important; color: var(--green); }
  .option-btn.wrong { border-color: var(--red) !important; background: var(--red-bg) !important; color: var(--red); }
  .option-letter { font-weight: 900; min-width: 20px; color: var(--muted); }
  .option-btn.correct .option-letter { color: var(--green); }
  .option-btn.wrong .option-letter { color: var(--red); }

  /* multiple select */
  .option-btn.selected-multi { border-color: var(--blue); background: #eef2fb; }
  .option-btn.correct-multi { border-color: var(--green) !important; background: var(--green-bg) !important; }
  .option-btn.wrong-multi { border-color: var(--red) !important; background: var(--red-bg) !important; }

  .explanation-box {
    margin-top: 16px; border-radius: 12px; padding: 18px;
    border-left: 4px solid; animation: fadeIn .3s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .explanation-box.correct-box { border-color: var(--green); background: var(--green-bg); }
  .explanation-box.wrong-box { border-color: var(--red); background: var(--red-bg); }
  .explanation-title { font-weight: 700; font-size: 15px; margin-bottom: 10px; }
  .explanation-text { font-size: 13.5px; line-height: 1.9; color: #2a3a55; }
  .ai-box { margin-top: 14px; background: #f0f4ff; border-radius: 10px; padding: 14px 16px; }
  .ai-box-title { font-size: 12px; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
  .ai-box-text { font-size: 13px; line-height: 1.8; color: #2a3a6a; }

  .quiz-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; flex-wrap: wrap; gap: 10px; }

  /* ── SUMMARY ── */
  .summary-circle {
    width: 140px; height: 140px; border-radius: 50%;
    border: 10px solid var(--blue); display: flex; flex-direction: column;
    align-items: center; justify-content: center; margin: 20px auto;
  }
  .summary-pct { font-size: 36px; font-weight: 900; color: var(--blue); line-height: 1; }
  .summary-sub { font-size: 12px; color: var(--muted); }

  /* ── STATS ── */
  .stats-q-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .stats-q-row:last-child { border-bottom: none; }
  .stats-q-text { flex: 1; color: var(--text); line-height: 1.4; }
  .stats-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 10px; white-space: nowrap; }
  .badge-good { background: var(--green-bg); color: var(--green); }
  .badge-weak { background: var(--red-bg); color: var(--red); }
  .badge-none { background: #f0f0f0; color: var(--muted); }

  /* CAT colors */
  .cat-環境衛生 { border-color: #2e7d32; } .cat-環境衛生 .progress-fill { background: #2e7d32; }
  .cat-食品衛生 { border-color: #e65100; } .cat-食品衛生 .progress-fill { background: #e65100; }
  .cat-毒性学   { border-color: #880e4f; } .cat-毒性学 .progress-fill { background: #880e4f; }
  .cat-感染制御 { border-color: #0d47a1; } .cat-感染制御 .progress-fill { background: #0d47a1; }
  .tag-環境衛生 { background: #e8f5e9; color: #2e7d32; }
  .tag-食品衛生 { background: #fff3e0; color: #e65100; }
  .tag-毒性学   { background: #fce4ec; color: #880e4f; }
  .tag-感染制御 { background: #e3f2fd; color: #0d47a1; }
  .tag-必須 { background: #e8eaf6; color: #3949ab; }
  .tag-理論 { background: #f3e5f5; color: #7b1fa2; }
  .tag-実践 { background: #e0f2f1; color: #00695c; }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .cat-grid { grid-template-columns: 1fr; }
    header { padding: 0 12px; }
    nav button { padding: 7px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <h1>衛生薬学 国試対策</h1>
  <p>PHARMACY EXAM PREP</p>
  <div class="loader"></div>
</div>

<!-- Header -->
<header>
  <div class="header-title">
    <small>PHARMACY EXAM PREP</small>
    <span>衛生薬学 国試対策</span>
  </div>
  <nav>
    <button onclick="showScreen('home')" id="nav-home" class="active">🏠 ホーム</button>
    <button onclick="showScreen('stats')" id="nav-stats">📊 進捗</button>
  </nav>
</header>

<main>
  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="stats-bar" id="stats-bar"></div>

    <div class="card" style="margin-bottom:16px">
      <div style="font-weight:700;font-size:15px;margin-bottom:12px">🔬 分野・セクションを選択</div>
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px">📁 分野</div>
      <div class="filter-row" id="cat-filters"></div>
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;margin-top:4px">📋 セクション</div>
      <div class="section-filter-row" id="sec-filters"></div>
      <div id="sub-filters" style="margin-bottom:12px"></div>
      <div id="quiz-count-area" style="margin-bottom:12px"></div>
      <div id="pool-info" style="font-size:13px;color:var(--muted);margin-bottom:14px"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startQuiz(false)">▶ 問題を解く</button>
        <button class="btn btn-secondary" id="weak-btn" onclick="startQuiz(true)" style="display:none">🔁 苦手問題を復習</button>
      </div>
    </div>

    <div class="cat-grid" id="cat-cards"></div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="card" style="margin-bottom:14px;padding:14px 18px">
      <div class="quiz-header">
        <span class="quiz-progress-text" id="q-progress"></span>
        <div style="display:flex;gap:6px" id="q-tags"></div>
      </div>
      <div class="progress-bar-lg"><div class="progress-fill-lg" id="q-progress-bar"></div></div>
    </div>

    <div class="card" id="quiz-card">
      <div class="q-meta" id="q-meta"></div>
      <div id="q-lead-area"></div>
      <div class="q-title" id="q-text"></div>
      <div id="q-image-area"></div>
      <div id="multi-hint" style="font-size:12px;color:var(--muted);margin-bottom:10px;display:none">※複数選択してください</div>
      <div class="options" id="q-options"></div>
      <div id="q-explanation"></div>
      <div class="quiz-footer" id="quiz-footer" style="display:none">
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="footer-left"></div>
        <button class="btn btn-primary" onclick="nextQuestion()" id="next-btn"></button>
      </div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="screen-summary" class="screen">
    <div class="card" style="text-align:center;padding:32px">
      <div style="font-size:40px;margin-bottom:8px">🎓</div>
      <div style="font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;margin-bottom:4px">セッション完了！</div>
      <div class="summary-circle" id="summary-circle">
        <div class="summary-pct" id="summary-pct"></div>
        <div class="summary-sub">正答率</div>
      </div>
      <div style="font-size:15px;color:var(--muted);margin-bottom:24px" id="summary-text"></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startQuiz(false)">もう一度</button>
        <button class="btn btn-secondary" onclick="showScreen('home')">ホームへ</button>
        <button class="btn btn-accent" id="retry-weak-btn" onclick="startQuiz(true)" style="display:none">🔁 不正解のみ再挑戦</button>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div id="screen-stats" class="screen">
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-weight:700;font-size:16px">📊 全体進捗</div>
        <button class="btn btn-secondary btn-sm" onclick="resetAll()" style="color:var(--red);border-color:var(--red);font-size:12px">🗑 全リセット</button>
      </div>
      <div class="stats-bar" id="stats-bar2"></div>
    </div>
    <div id="stats-cats"></div>
  </div>
</main>

<script>
// ── STATE ──
let ALL_QUESTIONS = [];
let records = {};
let selectedCat = 'すべて';
let selectedSec = 'すべて';
let selectedSub = 'すべて';
let quizCount = 10;
let quizQueue = [];
let currentIdx = 0;
let answered = false;
let selectedOptions = new Set();
let sessionResults = [];
const CATS = ['すべて','環境衛生','食品衛生','毒性学','感染制御'];
const SECS = ['すべて','必須','理論','実践'];

// コアカリ小分類（薬学教育モデル・コアカリキュラム 衛生薬学）
const SUBCATS = {
  'すべて': null,
  // 環境衛生
  '生態系と環境保全': /生態系|生物多様性|環境保全|地球温暖化|オゾン層|酸性雨|環境基本法|環境基準|SDGs/,
  '環境汚染と疾病': /大気汚染|水質汚染|土壌汚染|騒音|振動|悪臭|光化学スモッグ|PM2\.5|SPM|NOx|SOx|ダイオキシン|POPs|内分泌撹乱/,
  '水と健康': /水道|上水道|下水道|水質基準|浄水|塩素|消毒|トリハロメタン|クリプトスポリジウム|水系感染/,
  '室内環境と健康': /室内空気|シックハウス|ホルムアルデヒド|ラドン|一酸化炭素|換気|照明|温熱|騒音|VDT/,
  '放射線と健康': /放射線|放射能|Sv|Gy|Bq|X線|γ線|α線|β線|確率的影響|確定的影響|被ばく/,
  '地球環境問題': /温暖化|CO2|メタン|フロン|砂漠化|森林破壊|生物多様性条約|京都議定書|パリ協定/,
  // 食品衛生
  '食品と健康': /栄養|食生活|食事バランス|食品成分|機能性食品|保健機能食品|特定保健用食品|栄養機能食品/,
  '食中毒': /食中毒|サルモネラ|カンピロバクター|腸炎ビブリオ|黄色ブドウ球菌|ボツリヌス|腸管出血性大腸菌|O157|ノロウイルス|リステリア|セレウス/,
  '食品中の有害物質': /農薬|残留|動物用医薬品|食品中の汚染|重金属|カドミウム|水銀|鉛|ヒ素|アフラトキシン|カビ毒|アクリルアミド/,
  '食品添加物': /食品添加物|保存料|着色料|甘味料|酸化防止剤|防カビ剤|乳化剤|ソルビン酸|安息香酸|亜硝酸|ADI|NOAEL/,
  '食品の変質と保存': /腐敗|変敗|酸化|褐変|冷蔵|冷凍|乾燥|塩蔵|くん製|缶詰|レトルト|食品保存/,
  '食品衛生行政': /食品衛生法|食品安全基本法|食品安全委員会|HACCPハサップ|食品表示法|トレーサビリティ/,
  // 毒性学
  '毒性学総論': /毒性|LD50|TD50|用量反応|NOAEL|LOAEL|TDI|ADI|安全係数|不確実係数|毒性試験/,
  '器官毒性': /肝毒性|腎毒性|神経毒性|肺毒性|生殖毒性|催奇形性|免疫毒性|血液毒性/,
  '化学物質の毒性': /有機リン|カルバメート|有機塩素|重金属|水銀|カドミウム|鉛|ヒ素|シアン|一酸化炭素|ベンゼン|ダイオキシン/,
  '自然毒': /フグ|テトロドトキシン|貝毒|サキシトキシン|毒キノコ|アマニタ|ジャガイモ|ソラニン|植物毒|動物毒/,
  '変異原性・発がん性': /変異原|発がん|がん|腫瘍|Ames試験|染色体異常|DNA損傷|発がん物質|イニシエーター|プロモーター/,
  // 感染制御
  '感染症と微生物': /細菌|ウイルス|真菌|原虫|寄生虫|グラム|培養|滅菌|消毒|感染|病原体|宿主/,
  '感染症の予防': /予防接種|ワクチン|免疫|抗体|検疫|隔離|感染対策|標準予防策|スタンダード|PPE|手指衛生/,
  '感染症行政': /感染症法|一類|二類|三類|四類|五類|届出|報告|感染症サーベイランス|検疫法/,
  '院内感染': /院内感染|医療関連感染|MRSA|VRE|ESBL|多剤耐性|アウトブレイク|手洗い|消毒薬|滅菌法/,
  '主要感染症': /結核|インフルエンザ|HIV|AIDS|肝炎|梅毒|コレラ|腸チフス|マラリア|デング|COVID/,
};

// category mapping from JSONL
const CAT_MAP = {
  '環境衛生': q => isEnv(q),
  '食品衛生': q => isFood(q),
  '毒性学':   q => isTox(q),
  '感染制御': q => isInfection(q),
};

// Simple keyword-based category assignment
function assignCategory(q) {
  if (q._category) return q._category;
  const txt = (q.problem_text + ' ' + (q.comment||'')).toLowerCase();
  if (/感染|細菌|ウイルス|消毒|滅菌|mrsa|結核|標準予防|院内|抗菌|ワクチン|予防接種|検疫|隔離|手洗|マスク/.test(txt)) return '感染制御';
  if (/食中毒|食品添加|保存料|農薬|残留|腸炎|サルモネラ|ノロ|ボツリヌス|フグ|カビ毒|aflatoxin|食品衛生|食品安全|食品表示/.test(txt)) return '食品衛生';
  if (/重金属|水銀|カドミウム|鉛|砒素|農薬|有機リン|中毒|毒性|ld50|tdi|adi|noael|催奇形|変異原|発がん|染色体|変異/.test(txt)) return '毒性学';
  return '環境衛生';
}

function assignSubcat(q) {
  const txt = q.problem_text + ' ' + (q.comment||'');
  for (const [name, regex] of Object.entries(SUBCATS)) {
    if (name === 'すべて') continue;
    if (regex && regex.test(txt)) return name;
  }
  return null;
}

// ── LOAD DATA ──
async function loadData() {
  try {
    const res = await fetch('hygiene_with_images_v4.jsonl');
    const text = await res.text();
    const lines = text.trim().split('\n').filter(l => l.trim());
    ALL_QUESTIONS = lines.map(l => {
      const q = JSON.parse(l);
      q._category = assignCategory(q);
      q._subcat = assignSubcat(q);
      return q;
    });
    // init records
    ALL_QUESTIONS.forEach(q => {
      if (!records[q.problem_id]) records[q.problem_id] = {correct:0, wrong:0};
    });
    // load saved records
    try {
      const saved = localStorage.getItem('eisei_records');
      if (saved) records = JSON.parse(saved);
    } catch(e) {}
    hideLoading();
    renderHome();
  } catch(e) {
    document.querySelector('#loading p').textContent = 'データ読み込みエラー: ' + e.message;
  }
}

function saveRecords() {
  try { localStorage.setItem('eisei_records', JSON.stringify(records)); } catch(e) {}
}

function hideLoading() {
  const el = document.getElementById('loading');
  el.style.opacity = '0';
  setTimeout(() => el.style.display = 'none', 500);
}

// ── NAVIGATION ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  const nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'stats') renderStats();
}

// ── HOME ──
function getPool(weakOnly) {
  let pool = ALL_QUESTIONS;
  if (selectedCat !== 'すべて') pool = pool.filter(q => q._category === selectedCat);
  if (selectedSec !== 'すべて') pool = pool.filter(q => q.section === selectedSec);
  if (selectedSub !== 'すべて') pool = pool.filter(q => q._subcat === selectedSub);
  if (weakOnly) pool = pool.filter(q => (records[q.problem_id]?.wrong || 0) > 0);
  return pool;
}

function renderHome() {
  renderStatsBar('stats-bar');
  renderCatFilters();
  renderSecFilters();
  renderSubFilters();
  renderQuizCount();
  renderPoolInfo();
  renderCatCards();
  renderWeakBtn();
}

function renderSubFilters() {
  // 現在の分野に対応するサブカテゴリのみ表示
  const catSubcats = Object.keys(SUBCATS).filter(k => {
    if (k === 'すべて') return true;
    if (selectedCat === 'すべて') return true;
    const catMap = {
      '環境衛生': ['生態系と環境保全','環境汚染と疾病','水と健康','室内環境と健康','放射線と健康','地球環境問題'],
      '食品衛生': ['食品と健康','食中毒','食品中の有害物質','食品添加物','食品の変質と保存','食品衛生行政'],
      '毒性学':   ['毒性学総論','器官毒性','化学物質の毒性','自然毒','変異原性・発がん性'],
      '感染制御': ['感染症と微生物','感染症の予防','感染症行政','院内感染','主要感染症'],
    };
    return (catMap[selectedCat]||[]).includes(k);
  });
  const el = document.getElementById('sub-filters');
  if (!el) return;
  el.innerHTML = '<div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px">📚 コアカリ小分類</div>' +
    catSubcats.map(s =>
      `<button class="filter-btn ${s===selectedSub?'active':''}" onclick="selectSub('${s}')" style="font-size:11px">${s}</button>`
    ).join('');
}

function renderQuizCount() {
  const el = document.getElementById('quiz-count-area');
  if (!el) return;
  el.innerHTML = '<div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px">🎯 出題数</div>' +
    [5,10,20,30,'全問'].map(n =>
      `<button class="filter-btn ${quizCount===(n==='全問'?99999:n)?'active':''}" onclick="setQuizCount(${n==='全問'?99999:n})">${n}</button>`
    ).join('');
}

function setQuizCount(n) { quizCount = n; renderHome(); }

function renderStatsBar(id) {
  const total = Object.values(records).reduce((s,r)=>s+r.correct+r.wrong,0);
  const correct = Object.values(records).reduce((s,r)=>s+r.correct,0);
  const wrong = Object.values(records).reduce((s,r)=>s+r.wrong,0);
  const pct = total ? Math.round(correct/total*100) : 0;
  document.getElementById(id).innerHTML = [
    {label:'総回答数', val:total, color:'var(--navy)'},
    {label:'正解数', val:correct, color:'var(--green)'},
    {label:'不正解数', val:wrong, color:'var(--red)'},
    {label:'正答率', val:(total?pct+'%':'─'), color:'var(--blue)'},
  ].map(s=>`<div class="stat-box"><div class="stat-num" style="color:${s.color}">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function renderCatFilters() {
  document.getElementById('cat-filters').innerHTML = CATS.map(c =>
    `<button class="filter-btn ${c===selectedCat?'active':''}" onclick="selectCat('${c}')">${c}</button>`
  ).join('');
}

function renderSecFilters() {
  document.getElementById('sec-filters').innerHTML = SECS.map(s =>
    `<button class="filter-btn ${s===selectedSec?'active':''}" onclick="selectSec('${s}')">${s}</button>`
  ).join('');
}

function renderPoolInfo() {
  const pool = getPool(false);
  const weak = pool.filter(q => (records[q.problem_id]?.wrong||0)>0);
  const count = quizCount >= 99999 ? pool.length : Math.min(quizCount, pool.length);
  document.getElementById('pool-info').textContent = `対象: ${pool.length}問中 ${count}問を出題（うち苦手: ${weak.length}問）`;
}

function renderCatCards() {
  const cats = ['環境衛生','食品衛生','毒性学','感染制御'];
  document.getElementById('cat-cards').innerHTML = cats.map(cat => {
    const pool = ALL_QUESTIONS.filter(q=>q._category===cat);
    const c = pool.reduce((s,q)=>s+(records[q.problem_id]?.correct||0),0);
    const w = pool.reduce((s,q)=>s+(records[q.problem_id]?.wrong||0),0);
    const total = c+w;
    const pct = total ? Math.round(c/total*100) : 0;
    return `<div class="cat-card cat-${cat}" onclick="selectCat('${cat}')">
      <h3>${cat}</h3>
      <p>${pool.length}問収録</p>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">正答率 ${total?pct+'%':'未回答'}</div>
    </div>`;
  }).join('');
}

function renderWeakBtn() {
  const weak = getPool(true);
  const btn = document.getElementById('weak-btn');
  btn.style.display = weak.length > 0 ? 'inline-flex' : 'none';
  btn.textContent = `🔁 苦手問題を復習（${weak.length}問）`;
}

function selectCat(c) { selectedCat = c; selectedSub = 'すべて'; renderHome(); }
function selectSec(s) { selectedSec = s; renderHome(); }
function selectSub(s) { selectedSub = s; renderHome(); }

// ── QUIZ ──
function startQuiz(weakOnly) {
  const pool = getPool(weakOnly);
  if (pool.length === 0) { alert('該当する問題がありません'); return; }
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  quizQueue = quizCount >= 99999 ? shuffled : shuffled.slice(0, Math.min(quizCount, shuffled.length));
  currentIdx = 0;
  sessionResults = [];
  showScreen('quiz');
  document.getElementById('nav-quiz') && (document.getElementById('nav-quiz').classList.add('active'));
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  selectedOptions = new Set();
  const q = quizQueue[currentIdx];
  const isMulti = q.answer.length > 1;

  // progress
  document.getElementById('q-progress').textContent = `問題 ${currentIdx+1} / ${quizQueue.length}`;
  document.getElementById('q-progress-bar').style.width = `${(currentIdx+1)/quizQueue.length*100}%`;

  // tags
  document.getElementById('q-tags').innerHTML =
    `<span class="tag tag-${q._category}">${q._category}</span>` +
    `<span class="tag tag-${q.section}">${q.section}</span>`;

  // meta
  document.getElementById('q-meta').innerHTML =
    `<span style="font-size:13px;font-weight:700;color:var(--muted)">${q.display_title}</span>`;

  // リード問題（前提症例）の表示
  const leadArea = document.getElementById('q-lead-area');
  leadArea.innerHTML = '';
  if (q.lead_id) {
    const leadQ = ALL_QUESTIONS.find(x => x.problem_id === q.lead_id);
    if (leadQ) {
      leadArea.innerHTML = `
        <div class="lead-box">
          <div class="lead-box-title">📋 症例・前提情報（${leadQ.display_title}）</div>
          <div>${formatText(leadQ.problem_text)}</div>
          ${leadQ.assets && leadQ.assets.length > 0
            ? leadQ.assets.map(a => `<img src="${a}" class="q-image" alt="症例図" onerror="this.style.display='none'">`).join('')
            : ''}
        </div>`;
    }
  }

  // question text
  document.getElementById('q-text').innerHTML = formatText(q.problem_text);

  // image
  const imgArea = document.getElementById('q-image-area');
  imgArea.innerHTML = '';
  if (q.assets && q.assets.length > 0) {
    q.assets.forEach(asset => {
      const img = document.createElement('img');
      img.src = asset;
      img.className = 'q-image';
      img.alt = '問題図';
      img.onerror = () => img.style.display = 'none';
      imgArea.appendChild(img);
    });
  }

  // multi hint
  document.getElementById('multi-hint').style.display = isMulti ? 'block' : 'none';

  // options
  const optArea = document.getElementById('q-options');
  if (q.choices[0] === 'IMAGES') {
    // 選択肢が画像の問題
    const nums = q.answer.map(Number);
    const maxOpt = Math.max(...nums, 5);
    optArea.innerHTML = Array.from({length:maxOpt},(_,i)=>i+1).map(i =>
      `<button class="option-btn" id="opt-${i}" onclick="selectOption(${i},'${q.problem_id}')">
        <span class="option-letter">${i}</span>
        <span>選択肢 ${i}（画像参照）</span>
      </button>`
    ).join('');
  } else {
    optArea.innerHTML = q.choices.map((c,i) =>
      `<button class="option-btn" id="opt-${i+1}" onclick="selectOption(${i+1},'${q.problem_id}')">
        <span class="option-letter">${['ア','イ','ウ','エ','オ'][i]}</span>
        <span>${formatText(c)}</span>
      </button>`
    ).join('');
  }

  document.getElementById('q-explanation').innerHTML = '';
  document.getElementById('quiz-footer').style.display = 'none';

  // submit button for multi
  if (isMulti) {
    optArea.innerHTML += `<button class="btn btn-primary" style="margin-top:8px" onclick="submitMulti('${q.problem_id}')">✓ 回答を確定する</button>`;
  }
}

function selectOption(num, pid) {
  if (answered) return;
  const q = quizQueue[currentIdx];
  const isMulti = q.answer.length > 1;

  if (isMulti) {
    if (selectedOptions.has(num)) {
      selectedOptions.delete(num);
      document.getElementById('opt-'+num)?.classList.remove('selected-multi');
    } else {
      selectedOptions.add(num);
      document.getElementById('opt-'+num)?.classList.add('selected-multi');
    }
  } else {
    processAnswer([num], pid);
  }
}

function submitMulti(pid) {
  if (answered || selectedOptions.size === 0) return;
  processAnswer([...selectedOptions], pid);
}

function processAnswer(chosen, pid) {
  answered = true;
  const q = quizQueue[currentIdx];
  const correctNums = q.answer.map(Number);
  const isCorrect = correctNums.length === chosen.length &&
    correctNums.every(n => chosen.includes(n));

  if (!records[pid]) records[pid] = {correct:0,wrong:0};
  records[pid].correct += isCorrect ? 1 : 0;
  records[pid].wrong   += isCorrect ? 0 : 1;
  saveRecords();
  sessionResults.push({pid, correct:isCorrect});

  // highlight options
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  if (q.answer.length > 1) {
    // multi
    const allNums = q.choices[0]==='IMAGES'
      ? Array.from({length:5},(_,i)=>i+1)
      : q.choices.map((_,i)=>i+1);
    allNums.forEach(n => {
      const btn = document.getElementById('opt-'+n);
      if (!btn) return;
      if (correctNums.includes(n) && chosen.includes(n)) btn.classList.add('correct-multi');
      else if (correctNums.includes(n)) btn.classList.add('correct-multi');
      else if (chosen.includes(n)) btn.classList.add('wrong-multi');
    });
  } else {
    const chosenNum = chosen[0];
    const correctNum = correctNums[0];
    const correctBtn = document.getElementById('opt-'+correctNum);
    const chosenBtn  = document.getElementById('opt-'+chosenNum);
    if (correctBtn) correctBtn.classList.add('correct');
    if (chosenBtn && chosenNum !== correctNum) chosenBtn.classList.add('wrong');
  }

  // explanation
  const expBox = document.getElementById('q-explanation');
  expBox.innerHTML = `
    <div class="explanation-box ${isCorrect?'correct-box':'wrong-box'}">
      <div class="explanation-title" style="color:${isCorrect?'var(--green)':'var(--red)'}">
        ${isCorrect ? '✅ 正解！' : '❌ 不正解'} 　正解: ${correctNums.join('・')}番
      </div>
      <div class="explanation-text">${formatText(q.comment||'解説なし')}</div>

    </div>`;

  // footer
  const footer = document.getElementById('quiz-footer');
  footer.style.display = 'flex';
  document.getElementById('footer-left').innerHTML = '';
  document.getElementById('next-btn').textContent =
    currentIdx + 1 >= quizQueue.length ? '結果を見る 📋' : '次の問題 →';
}



function nextQuestion() {
  if (currentIdx + 1 >= quizQueue.length) {
    showSummary();
  } else {
    currentIdx++;
    renderQuestion();
  }
}

function showSummary() {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-summary').classList.add('active');
  const correct = sessionResults.filter(r=>r.correct).length;
  const total = sessionResults.length;
  const pct = total ? Math.round(correct/total*100) : 0;
  document.getElementById('summary-pct').textContent = pct + '%';
  document.getElementById('summary-text').textContent = `${correct} / ${total} 問正解`;
  const hasWrong = sessionResults.some(r=>!r.correct);
  document.getElementById('retry-weak-btn').style.display = hasWrong ? 'inline-flex' : 'none';
}

// ── STATS ──
function renderStats() {
  renderStatsBar('stats-bar2');
  const cats = ['環境衛生','食品衛生','毒性学','感染制御'];
  const container = document.getElementById('stats-cats');
  container.innerHTML = cats.map(cat => {
    const pool = ALL_QUESTIONS.filter(q=>q._category===cat);
    const rows = pool.map(q => {
      const r = records[q.problem_id] || {correct:0,wrong:0};
      const total = r.correct + r.wrong;
      const pct = total ? Math.round(r.correct/total*100) : null;
      const badge = pct===null
        ? `<span class="stats-badge badge-none">未回答</span>`
        : pct>=70
          ? `<span class="stats-badge badge-good">${pct}% (${r.correct}/${total})</span>`
          : `<span class="stats-badge badge-weak">⚠ ${pct}% (${r.correct}/${total})</span>`;
      return `<div class="stats-q-row">
        <div class="stats-q-text">${q.display_title}　${q.problem_text.slice(0,40)}…</div>
        ${badge}
      </div>`;
    }).join('');
    return `<div class="card" style="margin-bottom:14px;border-left:4px solid ${catColor(cat)}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-weight:700;font-size:14px;color:${catColor(cat)}">${cat}（${pool.length}問）</div>
        <button class="btn btn-secondary btn-sm" onclick="resetCat('${cat}')" style="color:var(--red);border-color:var(--red);font-size:11px">🗑 リセット</button>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function catColor(cat) {
  return {環境衛生:'#2e7d32',食品衛生:'#e65100',毒性学:'#880e4f',感染制御:'#0d47a1'}[cat]||'#333';
}

function resetAll() {
  if (!confirm('全問題の進捗をリセットしますか？\nこの操作は元に戻せません。')) return;
  ALL_QUESTIONS.forEach(q => { records[q.problem_id] = {correct:0, wrong:0}; });
  saveRecords();
  renderStats();
  alert('全進捗をリセットしました。');
}

function resetCat(cat) {
  if (!confirm(`「${cat}」の進捗をリセットしますか？`)) return;
  ALL_QUESTIONS.filter(q=>q._category===cat).forEach(q => {
    records[q.problem_id] = {correct:0, wrong:0};
  });
  saveRecords();
  renderStats();
}

// ── UTILS ──
function formatText(txt) {
  if (!txt) return '';
  // LaTeX記法を変換
  txt = txt
    .replace(/\\circ/g, '°')
    .replace(/\\times/g, '×')
    .replace(/\\pm/g, '±')
    .replace(/\\rightarrow/g, '→')
    .replace(/\\Delta/g, 'Δ')
    .replace(/\\alpha/g, 'α')
    .replace(/\\beta/g, 'β')
    .replace(/\\gamma/g, 'γ')
    .replace(/\\delta/g, 'δ')
    .replace(/\\epsilon/g, 'ε')
    .replace(/\\micro(?!L|g)/g, 'μ')
    .replace(/\\microL/g, 'μL')
    .replace(/\\microg/g, 'μg')
    .replace(/\\fallingdotseq/g, '≒');
  // 上付き・下付き文字
  txt = txt
    .replace(/\^\{\*\}/g,'<sup>*</sup>')
    .replace(/\^\{([^}]+)\}/g,'<sup>$1</sup>')
    .replace(/_\{([^}]+)\}/g,'<sub>$1</sub>');
  // 改行処理
  txt = txt.replace(/\n/g, '<br>');
  // 「1:誤」「2:正」などの番号の前で改行
  txt = txt.replace(/([。）])([1-9][0-9]?[:：])/g, '$1<br>$2');
  txt = txt.replace(/([a-zA-Z0-9])\.([1-9][0-9]?[:：])/g, '$1.<br>$2');
  // 「参考」の前にも改行
  txt = txt.replace(/(参考)/g, '<br>$1');
  return txt;
}

// ── INIT ──
loadData();
</script>
